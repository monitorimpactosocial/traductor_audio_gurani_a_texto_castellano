<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Recolector Guaraní</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Recolector de audio — Guaraní</h1>
      <label>Usuario ID: <input id="userId" placeholder="opcional"></label>
      <div id="promptBox" class="prompt">Cargando texto...</div>
      <div class="controls">
        <button id="recordBtn">Grabar</button>
        <button id="stopBtn" disabled>Detener</button>
        <button id="playBtn" disabled>Reproducir</button>
        <button id="nextBtn">Siguiente texto</button>
      </div>
      <label>Transcripción (opcional):</label>
      <textarea id="transcript" rows="3" placeholder="Escribe la transcripción..."></textarea>
      <div>
        <button id="submitBtn" disabled>Enviar grabación</button>
      </div>
      <div id="status"></div>
    </div>
    <script src="/static/app.js"></script>
  </body>
</html>
